<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    .chat {
      display: flex;
      flex-direction: column;
      height: 80vh;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .form {
      display: flex;
    }

    .input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .submit {
      padding: 10px;
      border: 1px solid #ccc;
      background: #eee;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!--入室画面-->
  <div id="setup-screen">
    <h2>テストチャットルーム</h2>
    <form id="setup-form">
      <input id="username-input" placeholder="名前を入力してください" autocomplete="off">
      <button type="submit">入室する</button>
    </form>
  </div>

  <!--チャット、キャンパス画面-->
  <div id="chat-screen" style="display:none;"><!--最初は非表示-->
    <div class="chat">
      <ul class="messages"></ul>
      <form class="form">
        <input class="input" autocomplete="off" />
        <button class="submit">Send</button>
      </form>
    </div>
    <canvas id="canvas" width="600" height="600" style="border: solid 1px black"></canvas>
  </div>

  <script>
    function main() {
      const host = location.origin.replace(/^http/, 'ws')
      const ws = new WebSocket(host + '/ws')
      const myId = self.crypto.randomUUID().substr(0, 8)
      let myName = "";

      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')

      let drawing = false

      const setupScreen = document.getElementById('setup-screen');
      const chatScreen = document.getElementById('chat-screen');
      const setupForm = document.getElementById('setup-form');
      const usernameInput = document.getElementById('username-input');

      setupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        myName = usernameInput.value;
        if (myName === '') {
          const number = parseInt(myId.substr(0, 4), 16) % 1000; //名無しさんに、myIDを元に番号を振り分ける
          myName = "名無しさん" + number
        }
        setupScreen.style.display = 'none';
        chatScreen.style.display = 'block';

        ws.send(JSON.stringify({ id: myId, name: myName, type: 'join' }));
      })

      canvas.addEventListener('mousedown', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mousedown')
      })
      function mousedown() {
        drawing = true
        ctx.beginPath()
      }

      canvas.addEventListener('mousemove', (e) => {
        if (drawing) {
          sendDrawingEvent(e.offsetX, e.offsetY, 'mousemove')
        }
      })
      function mousemove(x, y) {
        if (drawing) {
          draw(x, y, true)
        }
      }

      canvas.addEventListener('mouseup', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mouseup')
      })
      function mouseup() {
        drawing = false
        ctx.beginPath()
      }

      canvas.addEventListener('mouseout', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mouseout')
      })
      function mouseout() {
        drawing = false
      }

      function draw(x, y, dragging) {
        if (dragging) {
          ctx.lineTo(x, y)
          ctx.stroke()
        } else {
          ctx.moveTo(x, y)
        }
      }

      function sendDrawingEvent(x, y, control) {
        const message = JSON.stringify({ x, y, control, type: 'paint' })
        ws.send(message)
      }

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data) //jsonをデータオブジェクトに変換
        if (msg.type === 'join') {
          const { name } = msg
          const messageList = document.querySelector('.messages')
          const li = document.createElement('li')
          li.textContent = `${name}さんが参加しました!`
          li.style.color = '#666'
          li.style.backgroundColor = "#eee"
          li.style.borderRadius = "10px"
          li.style.padding = "10px"
          li.style.marginTop = "20px"
          li.style.marginBottom = "20px"
          messageList.appendChild(li)
        }
        if (msg.type === 'paint') {
          const { x, y, control } = msg
          console.log({ control })
          if (control === 'mousedown') {
            mousedown()
          } else if (control === 'mouseup') {
            mouseup()
          } else if (control === 'mousemove') {
            mousemove(x, y)
          } else if (control === 'mouseout') {
            mouseout()
          }
        }
        if (msg.type === 'chat') {
          const { id, name, text } = msg
          const messageList = document.querySelector('.messages')
          const li = document.createElement('li')
          const displayName = name || id; //名前が設定されてなかったらidを表示
          if (id === myId) {
            li.textContent = `${displayName}(自分): ${text}`
          } else {
            li.textContent = `${displayName}: ${text}`
          }
          messageList.appendChild(li)
        }
      }

      const form = document.querySelector('.form')

      form.onsubmit = function (e) {
        e.preventDefault()
        const input = document.querySelector('.input')
        const text = input.value
        ws.send(JSON.stringify({ id: myId, name: myName, text: text, type: 'chat' }))
        input.value = ''
        input.focus()
      }

      ws.onerror = function (error) {
        console.error('WebSocket Error: ', error)
      }
    }

    main()
  </script>
</body>

</html>
